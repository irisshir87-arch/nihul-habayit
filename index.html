<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2859d8" />
  <meta name="description" content="אפליקציית ניהול הבית של משפחת זילכה" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>ניהול הבית | משפחת זילכה</title>
</head>
<body>
  <section id="auth-screen" class="auth-screen hidden" aria-labelledby="auth-title">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">⌂</div>
        <div>
          <p class="eyebrow">משפחת זילכה</p>
          <h1 id="auth-title">כניסה לניהול הבית</h1>
        </div>
      </div>
      <p class="muted">הכניסה מיועדת לאיריס ולתומר בלבד. הזינו את הסיסמה המשפחתית.</p>
      <form id="auth-form" class="form-stack">
        <label>סיסמה
          <input id="auth-password" type="password" autocomplete="current-password" minlength="6" required />
        </label>
        <button class="primary-button" id="auth-submit" type="submit">כניסה</button>
      </form>
      <p id="auth-message" class="auth-message" role="status"></p>
    </div>
  </section>

  <div id="app-shell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">⌂</div>
        <div>
          <h1>ניהול הבית</h1>
          <p>משפחת זילכה</p>
        </div>
      </div>
      <nav id="desktop-nav" class="nav-list" aria-label="ניווט ראשי"></nav>
      <div class="sidebar-footer">
        <div id="signed-in-user" class="signed-in-user hidden"></div>
        <button class="ghost-button hidden" id="sign-out">יציאה</button>
        <button class="ghost-button" id="reset-demo">איפוס נתוני הדוגמה</button>
      </div>
    </aside>

    <div class="content-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="screen-eyebrow">ניהול הבית</p>
          <h2 id="screen-title">בית</h2>
        </div>
        <div class="topbar-actions">
          <span class="sync-indicator" title="נשמר במכשיר">● נשמר</span>
          <button class="primary-button" id="quick-add">＋ הוספה</button>
        </div>
      </header>
      <main id="app" class="main-content" aria-live="polite"></main>
    </div>
  </div>

  <nav id="mobile-nav" class="mobile-nav hidden" aria-label="ניווט ראשי"></nav>

  <dialog id="app-dialog" class="app-dialog">
    <form method="dialog" class="dialog-card" id="dialog-form">
      <div class="dialog-header">
        <div>
          <p class="eyebrow" id="dialog-eyebrow"></p>
          <h3 id="dialog-title"></h3>
        </div>
        <button class="icon-button" type="button" data-close-dialog aria-label="סגירה">✕</button>
      </div>
      <div id="dialog-body" class="dialog-body"></div>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog>ביטול</button>
        <button class="primary-button" id="dialog-submit" type="submit">שמירה</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
